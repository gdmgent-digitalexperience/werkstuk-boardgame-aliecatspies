<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artefact Stelen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">Ben je klaar om het artefact te stelen?</button>
    </div>
    <div id="choice-screen" style="display: none;">
        <h2>Kies een moeilijkheidsgraad</h2>
        <button class="difficulty-btn" data-difficulty="0">Makkelijk : 1 punt (groen)</button>
        <button class="difficulty-btn" data-difficulty="1">Gemiddeld : 2 punten (blauw)</button>
        <button class="difficulty-btn" data-difficulty="2">Moeilijk!! : 3 punten (oranje)</button>
    </div>
    <div id="game-screen" style="display: none;">
        <p id="difficulty-text"></p>
        <canvas id="roulette-canvas" width="400" height="400"></canvas>
        <button id="stop-btn" class="difficulty-btn">Tap om te stoppen</button>
    </div>
    <div id="result-screen" style="display: none;">
        <p id="result-text"></p>
        <video id="result-video" controls style="display: none;"></video>
        <audio id="result-audio" controls style="display: none;"></audio>
        <a href="index.html" class="large-box back-button">Terug naar homepage</a>
    </div>
    <script src="js/roulette.js"></script>
</body>
</html>
